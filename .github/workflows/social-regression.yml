name: Social Regression Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master

jobs:
  social-regression:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            eoynx-app/package-lock.json
            eoynx-mobile/package-lock.json

      - name: Validate required secrets
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required secrets: NEXT_PUBLIC_SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

      - name: Install web dependencies
        working-directory: eoynx-app
        run: npm install

      - name: Run web social regression
        working-directory: eoynx-app
        run: npm run qa:social-regression

      - name: Install mobile dependencies
        working-directory: eoynx-mobile
        run: npm install

      - name: Run mobile social regression
        working-directory: eoynx-mobile
        run: npm run qa:social-regression
